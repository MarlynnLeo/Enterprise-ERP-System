<!DOCTYPE html>
<html lang="zh-CN" class="fullscreen-html">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <!-- PWA相关配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KACON-ERP">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#1989fa">
    <meta name="application-name" content="KACON-ERP">
    <meta name="description" content="企业资源管理系统移动端">
    <!-- Web应用清单 -->
    <link rel="manifest" href="/manifest.json">
    <!-- 禁止页面缓存，防止全屏问题 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- iPhone主屏幕图标 -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png">
    <!-- iPhone启动画面 -->
    <link rel="apple-touch-startup-image" href="/icons/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/icons/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/icons/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
    
    <!-- Google Design Identity (WithGoogle Aesthetic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols Rounded -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <title>KACON-ERP移动端</title>
    <style>
      /* 初始化视口高度变量 */
      :root {
        --vh: 1vh;
      }
      
      html, body {
        height: 100% !important;
        height: calc(var(--vh, 1vh) * 100) !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        position: fixed !important;
        width: 100% !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        background-color: transparent !important;
      }
      
      #app {
        height: 100%;
        height: calc(var(--vh, 1vh) * 100);
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        box-sizing: border-box;
        padding-bottom: env(safe-area-inset-bottom);
      }
      
      .fullscreen-html {
        background-color: #f7f8fa;
      }
      
      /* 阻止Safari橡皮筋滚动效果 */
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      
      /* 添加到主屏幕模式下的样式 */
      @media all and (display-mode: standalone) {
        body {
          position: fixed !important;
          width: 100% !important;
          height: 100% !important;
          overflow: hidden !important;
        }
      }
      
      /* iOS专用底部修复 */
      @supports (-webkit-touch-callout: none) {
        body {
          padding-bottom: env(safe-area-inset-bottom);
        }
      }
    </style>
    <!-- 立即运行的脚本，设置vh变量 -->
    <script>
      // 设置真实的视口高度
      function setViewportHeight() {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      
      // 页面加载时设置
      window.addEventListener('DOMContentLoaded', setViewportHeight);
      
      // 窗口大小变化时重新设置
      window.addEventListener('resize', setViewportHeight);
      
      // 立即执行一次
      setViewportHeight();
      
      // 检测是否为iOS
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        document.documentElement.classList.add('ios-device');
      }
      
      // 检测是否是从主屏幕启动的Web应用
      const isStandalone = window.navigator.standalone === true || 
                           window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone) {
        document.documentElement.classList.add('standalone-mode');
        localStorage.setItem('forceFullscreen', 'true');
      }
      
      // 清理现有的Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(function(boolean) {
              console.log('Service Worker已清理:', boolean);
            });
          }
        });
      }

      // 清理所有缓存
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
