name: ERP CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 后端检查
  backend-lint-test:
    name: 后端 Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: mes_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 安装后端依赖
        working-directory: backend
        run: npm ci

      - name: 代码格式检查
        working-directory: backend
        run: npm run format:check || echo "格式检查完成（存在格式问题）"

      - name: ESLint 代码检查
        working-directory: backend
        run: npm run lint || echo "Lint检查完成（存在lint问题）"

      - name: 运行单元测试
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: mes_test
          JWT_SECRET: test-jwt-secret-ci
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-ci
          NODE_ENV: test
        run: npm test -- --passWithNoTests

  # 前端检查
  frontend-build:
    name: 前端 Build 验证
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建前端
        working-directory: frontend
        run: npm run build

  # 安全检查
  security-audit:
    name: 依赖安全审计
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 后端依赖安全审计
        working-directory: backend
        run: npm audit --audit-level=high || echo "发现高危漏洞，请及时修复"

      - name: 前端依赖安全审计
        working-directory: frontend
        run: npm audit --audit-level=high || echo "发现高危漏洞，请及时修复"
