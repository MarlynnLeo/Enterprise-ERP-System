version: '3.8'

services:
  # ==================== 后端服务 ====================
  erp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    ports:
      - "18080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL}
      # 数据库 — 连接宿主机 MySQL
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-mes}
      # 数据库连接池
      - DB_CONNECTION_LIMIT=10
      - DB_QUEUE_LIMIT=20
      - DB_CONNECT_TIMEOUT=60000
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRY=2h
      - JWT_REFRESH_TOKEN_EXPIRY=7d
      - JWT_ACCESS_EXPIRY=2h
      - JWT_REFRESH_EXPIRY=7d
      # CSRF
      - CSRF_SECRET=${CSRF_SECRET}
      # CORS – 生产环境必须显式配置允许的前端来源
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      # Redis
      - REDIS_ENABLED=true
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      # Ollama
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_OCR_MODEL=deepseek-ocr:latest
      - OLLAMA_TIMEOUT=60000
      # 智谱AI
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      # 天气
      - AMAP_API_KEY=${AMAP_API_KEY}
      # SiliconFlow
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_VLM_MODEL=deepseek-ai/DeepSeek-OCR
      # 日志
      - LOG_LEVEL=info
      - ENABLE_DEBUG_LOG=false
      - ENABLE_SQL_LOG=false
    volumes:
      - erp-uploads:/app/uploads
      - erp-logs:/app/logs
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==================== 前端服务 ====================
  erp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "18081:80"
    depends_on:
      erp-backend:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  erp-network:
    driver: bridge

volumes:
  erp-uploads:
    driver: local
  erp-logs:
    driver: local
